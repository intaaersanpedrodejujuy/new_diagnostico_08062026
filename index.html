<title>

<link rel="stylesheet" href="style.css">

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.container{
    max-width:350px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.grid{

    display:grid;

    grid-template-columns:
        repeat(2,1fr);

    gap:20px;
}

.card{

    background:white;

    border-radius:12px;

    padding:20px;

    text-align:center;

    text-decoration:none;

    color:#333;

    box-shadow:
        0 2px 6px rgba(0,0,0,.15);

    transition:.2s;
}

.card:hover{

    transform:translateY(-4px);

    box-shadow:
        0 4px 12px rgba(0,0,0,.2);
}

.card img{

    width:100px;

    height:100px;

    object-fit:contain;

    margin-bottom:10px;
}

.card span{

    display:block;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>
Enfermedades del Tomate
</h1>

<div class="grid">

</div>
